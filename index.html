<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lunar Lander</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <!-- HUD overlay -->
    <div id="hud">
      <div class="hud-item">
        <span class="hud-label">ALTITUDE</span>
        <span class="hud-value" id="hud-altitude">0 m</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">V-SPEED</span>
        <span class="hud-value" id="hud-vspeed">0.0 m/s</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">H-SPEED</span>
        <span class="hud-value" id="hud-hspeed">0.0 m/s</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">FUEL</span>
        <span class="hud-value" id="hud-fuel">100%</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">SCORE</span>
        <span class="hud-value" id="hud-score">0</span>
      </div>
    </div>

    <!-- Overlay screen (Intro / Game Over / Victory) -->
    <div id="overlay" class="active">
      <div id="overlay-content">
        <h1 id="overlay-title">LUNAR LANDER</h1>
        <p id="overlay-message">
          Guide your ship to the landing pad.<br/>
          Land gently to survive!
        </p>
        <div id="overlay-stats" class="hidden"></div>
        <div id="controls-hint">
          <p><kbd>↑</kbd> Main thruster &nbsp; <kbd>←</kbd><kbd>→</kbd> Rotate</p>
          <p><kbd>↓</kbd> Retro-burn (emergency brake)</p>
        </div>
        <button id="action-btn">LAUNCH</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
